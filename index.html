<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Farm - Carrot</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main Farm UI Panel -->
    <div id="farm-panel" class="farm-panel">
        <div class="panel-inner">
            <!-- Title -->
            <div class="title-row">
                <span class="diamond">◆</span>
                <span class="title-text">CARROT</span>
                <span class="diamond">◆</span>
            </div>

            <!-- Carrot Image -->
            <div class="carrot-container">
                <div class="carrot-glow"></div>
                <img id="carrot-img" src="carrot.png" alt="Carrot" class="carrot-img" />
            </div>

            <!-- Counter -->
            <div class="counter-section">
                <div class="counter-label">จำนวน</div>
                <div class="counter-value">
                    <span id="current-count">0</span>
                    <span class="counter-separator">/</span>
                    <span id="max-count">60</span>
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
            </div>

            <!-- Status -->
            <div id="status-text" class="status-text">พร้อมเริ่มฟาร์ม</div>
        </div>

        <!-- Bottom Bar -->
        <div class="bottom-bar">
            <span>กด</span>
            <span class="key-badge">N</span>
            <span id="action-text">เพื่อเริ่มฟาร์มออโต้</span>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast hidden">
        <span id="toast-text"></span>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>

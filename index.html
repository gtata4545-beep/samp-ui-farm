<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Farm UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="farm-container" class="ui-hidden">
        <div class="card-main">
            <div class="card-header">
                <span class="diamond-icon">◆</span>
                <span class="item-title">CARROT</span>
                <span class="diamond-icon">◆</span>
            </div>
            
            <div class="card-body">
                <div class="image-slot">
                    <div class="glow-bg"></div>
                    <img src="https://i.postimg.cc/YSksPHS5/9332087.png" alt="Item Image" class="item-image">
                </div>
                
                <div class="amount-label">จำนวน</div>
                
                <div class="count-container">
                    <span id="current-count">0</span>
                    <span class="divider">/</span>
                    <span id="max-count">60</span>
                </div>
            </div>
        </div>

        <div class="footer-button">
            กด <span class="key-trigger">N</span> เพื่อเริ่มฟาร์มออโต้
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
